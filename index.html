<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reference Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.6/JsBarcode.all.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #eaecf0;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  .hidden { display: none !important; }

  /* ════════════════════════════════
     LOGIN SCREEN
  ════════════════════════════════ */
  #loginScreen {
    position: fixed;
    inset: 0;
    background: #eaecf0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
  }
  .login-card {
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 4px 28px rgba(0,0,0,0.10);
    padding: 48px 44px 40px;
    width: 100%;
    max-width: 400px;
  }
  .login-logo { font-size: 1.3rem; font-weight: 700; color: #1a1f2e; margin-bottom: 5px; }
  .login-sub  { font-size: 0.83rem; color: #8a92a8; margin-bottom: 32px; }
  .login-label {
    display: block; font-size: 0.8rem; font-weight: 500;
    color: #4a5168; margin-bottom: 6px;
  }
  .login-input {
    width: 100%; border: 1px solid #d8dce8; border-radius: 8px;
    padding: 10px 14px; font-size: 0.88rem; color: #1a1f2e;
    outline: none; font-family: inherit; background: #fff;
    transition: border-color .15s, box-shadow .15s; margin-bottom: 18px;
  }
  .login-input:focus { border-color: #7c8cf8; box-shadow: 0 0 0 3px rgba(124,140,248,.15); }
  .login-btn {
    width: 100%; background: #7c8cf8; color: #fff; border: none;
    border-radius: 8px; padding: 11px; font-size: .92rem; font-weight: 600;
    cursor: pointer; transition: background .15s; font-family: inherit; margin-top: 4px;
  }
  .login-btn:hover { background: #6674f0; }
  .login-btn:disabled { background: #b0b8e8; cursor: not-allowed; }
  .login-error { font-size: .8rem; color: #e05252; margin-top: 12px; min-height: 18px; text-align: center; }

  /* ════════════════════════════════
     APP SHELL
  ════════════════════════════════ */
  #appShell {
    display: flex; width: 100%; height: 100vh; overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 420px; min-width: 320px; background: #f8f9fb;
    border-right: 1px solid #e2e6ea;
    display: flex; flex-direction: column; padding: 28px 28px 24px;
    flex-shrink: 0;
  }
  .sidebar-header { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
  .sidebar-header h1 { font-size: 1.15rem; font-weight: 700; color: #1a1f2e; line-height: 1.25; }
  .header-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }

  .btn-primary {
    display: flex; align-items: center; gap: 7px;
    background: #7c8cf8; color: #fff; border: none; border-radius: 8px;
    padding: 8px 16px; font-size: .875rem; font-weight: 500;
    cursor: pointer; transition: background .15s; font-family: inherit;
  }
  .btn-primary:hover { background: #6674f0; }
  .btn-primary svg { width: 15px; height: 15px; }

  .btn-icon {
    background: none; border: none; cursor: pointer; color: #8a92a8;
    padding: 6px; border-radius: 6px; display: flex; align-items: center;
    transition: color .15s, background .15s;
  }
  .btn-icon:hover { color: #4a5168; background: #e8eaf0; }
  .btn-icon svg { width: 18px; height: 18px; }

  .form-group { margin-bottom: 20px; }
  .form-label { display: block; font-size: .82rem; font-weight: 500; color: #4a5168; margin-bottom: 7px; }
  .form-label .req { color: #e05252; margin-left: 2px; }
  .form-label .opt { color: #9ba3b8; font-weight: 400; }
  .form-input, .form-textarea {
    width: 100%; background: #fff; border: 1px solid #d8dce8;
    border-radius: 8px; padding: 10px 14px; font-size: .88rem; color: #1a1f2e;
    outline: none; transition: border-color .15s, box-shadow .15s; font-family: inherit;
  }
  .form-input::placeholder, .form-textarea::placeholder { color: #b0b8cc; }
  .form-input:focus, .form-textarea:focus { border-color: #7c8cf8; box-shadow: 0 0 0 3px rgba(124,140,248,.15); }
  .form-textarea { resize: vertical; min-height: 100px; }

  /* ── PREVIEW AREA ── */
  .preview-area {
    flex: 1; overflow-y: auto; padding: 32px;
    display: flex; align-items: flex-start; justify-content: center; background: #eaecf0;
  }
  .document-page {
    background: #fff; width: 210mm; min-height: 297mm; border-radius: 4px;
    box-shadow: 0 2px 12px rgba(0,0,0,.08); padding: 40px 56px 56px; flex-shrink: 0;
  }
  .doc-header { border-bottom: 1px solid #e2e6ea; padding-bottom: 16px; margin-bottom: 40px; }
  .doc-title { font-size: .72rem; font-weight: 700; letter-spacing: .12em; color: #6b7591; text-transform: uppercase; }
  .barcodes-container { display: flex; flex-direction: column; align-items: center; gap: 40px; }
  .barcode-block { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .barcode-label { font-size: .7rem; font-weight: 600; letter-spacing: .1em; color: #7c8fa8; text-transform: uppercase; }
  .barcode-value { font-size: .82rem; font-weight: 600; letter-spacing: .06em; color: #2a3148; }
  .barcode-svg { display: block; }
  .empty-state { display: flex; align-items: center; justify-content: center; height: 320px; color: #adb5c8; font-size: .9rem; }
  .doc-description { margin-top: 32px; padding-top: 24px; border-top: 1px solid #edf0f5; font-size: .82rem; color: #5a6380; line-height: 1.6; white-space: pre-wrap; }

  /* ════════════════════════════════
     ADMIN MODAL
  ════════════════════════════════ */
  #adminModal {
    position: fixed; inset: 0; background: rgba(20,24,40,.45);
    display: flex; align-items: center; justify-content: center; z-index: 300;
  }
  .admin-panel {
    background: #fff; border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,.18);
    width: 100%; max-width: 680px; max-height: 88vh;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .admin-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 28px 18px; border-bottom: 1px solid #e8eaf0;
  }
  .admin-header h2 { font-size: 1rem; font-weight: 700; color: #1a1f2e; }
  .admin-body { padding: 24px 28px; overflow-y: auto; flex: 1; }

  /* Add user form inside modal */
  .add-user-form {
    background: #f8f9fb; border: 1px solid #e2e6ea; border-radius: 10px;
    padding: 20px 20px 16px; margin-bottom: 28px;
  }
  .add-user-form h3 { font-size: .82rem; font-weight: 700; color: #4a5168; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 16px; }
  .add-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .add-form-grid .full { grid-column: 1 / -1; }
  .add-form-grid label { font-size: .78rem; font-weight: 500; color: #4a5168; display: block; margin-bottom: 5px; }
  .add-form-grid input, .add-form-grid select {
    width: 100%; border: 1px solid #d8dce8; border-radius: 7px;
    padding: 9px 12px; font-size: .85rem; color: #1a1f2e;
    outline: none; font-family: inherit; background: #fff;
    transition: border-color .15s, box-shadow .15s;
  }
  .add-form-grid input:focus, .add-form-grid select:focus { border-color: #7c8cf8; box-shadow: 0 0 0 3px rgba(124,140,248,.12); }
  .add-form-row { display: flex; gap: 8px; margin-top: 14px; align-items: center; }
  .add-form-error { font-size: .78rem; color: #e05252; flex: 1; }
  .btn-add {
    background: #7c8cf8; color: #fff; border: none; border-radius: 7px;
    padding: 9px 20px; font-size: .85rem; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: background .15s; white-space: nowrap;
  }
  .btn-add:hover { background: #6674f0; }

  /* User table */
  .users-section h3 { font-size: .82rem; font-weight: 700; color: #4a5168; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 14px; }
  .user-table { width: 100%; border-collapse: collapse; }
  .user-table th {
    font-size: .72rem; font-weight: 600; color: #8a92a8; text-transform: uppercase;
    letter-spacing: .07em; text-align: left; padding: 0 10px 10px; border-bottom: 1px solid #e8eaf0;
  }
  .user-table td { padding: 12px 10px; border-bottom: 1px solid #f0f2f7; vertical-align: middle; }
  .user-table tr:last-child td { border-bottom: none; }
  .user-email { font-size: .85rem; color: #1a1f2e; font-weight: 500; }
  .user-role {
    display: inline-block; font-size: .7rem; font-weight: 700; padding: 2px 8px;
    border-radius: 20px; text-transform: uppercase; letter-spacing: .05em;
  }
  .role-admin { background: #ede9fe; color: #6d28d9; }
  .role-user  { background: #e0f2fe; color: #0369a1; }

  .expiry-badge {
    font-size: .78rem; font-weight: 500; padding: 3px 9px; border-radius: 20px;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .expiry-ok      { background: #dcfce7; color: #15803d; }
  .expiry-soon    { background: #fef9c3; color: #a16207; }
  .expiry-expired { background: #fee2e2; color: #b91c1c; }
  .expiry-never   { background: #f1f5f9; color: #64748b; }

  .btn-remove {
    background: none; border: 1px solid #fca5a5; color: #dc2626;
    border-radius: 6px; padding: 5px 12px; font-size: .78rem; font-weight: 500;
    cursor: pointer; font-family: inherit; transition: background .15s, color .15s;
  }
  .btn-remove:hover { background: #fee2e2; }
  .no-users { text-align: center; color: #adb5c8; font-size: .88rem; padding: 24px 0; }

  /* ════════════════════════════════
     PRINT
  ════════════════════════════════ */
  @media print {
    #loginScreen, #adminModal { display: none !important; }
    body { background: #fff; height: auto; overflow: visible; }
    .sidebar { display: none; }
    .preview-area { padding: 0; background: #fff; }
    .document-page { box-shadow: none; }
  }
</style>
</head>
<body>

<!-- ══════════════════════════════
     LOGIN SCREEN
══════════════════════════════ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">Reference Generator</div>
    <div class="login-sub">Sign in to your account</div>
    <label class="login-label" for="loginEmail">Email</label>
    <input class="login-input" id="loginEmail" type="email" placeholder="you@example.com" autocomplete="email" />
    <label class="login-label" for="loginPassword">Password</label>
    <input class="login-input" id="loginPassword" type="password" placeholder="••••••••" autocomplete="current-password"
      onkeydown="if(event.key==='Enter') attemptLogin()" />
    <button class="login-btn" id="loginBtn" onclick="attemptLogin()">Sign in</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ══════════════════════════════
     APP SHELL
══════════════════════════════ -->
<div id="appShell" class="hidden">

  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>Reference<br>Generator</h1>
      <div class="header-actions">
        <!-- Admin users button (only visible to admin) -->
        <button class="btn-icon" id="adminBtn" title="Manage users" onclick="openAdmin()" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </button>
        <button class="btn-primary" onclick="window.print()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 6 2 18 2 18 9"/>
            <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
            <rect x="6" y="14" width="12" height="8"/>
          </svg>
          Print / Export
        </button>
        <button class="btn-icon" title="Sign out" onclick="signOut()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="ticketRef">Ticket reference <span class="req">*</span></label>
      <input class="form-input" id="ticketRef" type="text" placeholder="e.g. TKT-20260316-001" oninput="updatePreview()" />
    </div>
    <div class="form-group">
      <label class="form-label" for="elevcRef">Elev-pc reference <span class="req">*</span></label>
      <input class="form-input" id="elevcRef" type="text" placeholder="e.g. EPC-A3F-7829" oninput="updatePreview()" />
    </div>
    <div class="form-group">
      <label class="form-label" for="description">Description <span class="opt">(optional)</span></label>
      <textarea class="form-textarea" id="description" placeholder="Add any additional notes..." oninput="updatePreview()"></textarea>
    </div>
  </aside>

  <main class="preview-area">
    <div class="document-page">
      <div class="doc-header">
        <div class="doc-title">Reference Document</div>
      </div>
      <div id="previewContent">
        <div class="empty-state">Enter references to see preview</div>
      </div>
    </div>
  </main>

</div>

<!-- ══════════════════════════════
     ADMIN MODAL
══════════════════════════════ -->
<div id="adminModal" class="hidden">
  <div class="admin-panel">
    <div class="admin-header">
      <h2>User Administration</h2>
      <button class="btn-icon" onclick="closeAdmin()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="admin-body">
      <!-- Add user -->
      <div class="add-user-form">
        <h3>Add New User</h3>
        <div class="add-form-grid">
          <div>
            <label for="newEmail">Email address</label>
            <input id="newEmail" type="email" placeholder="user@example.com" />
          </div>
          <div>
            <label for="newPassword">Password</label>
            <input id="newPassword" type="password" placeholder="••••••••" />
          </div>
          <div>
            <label for="newExpiry">Access expires</label>
            <select id="newExpiry">
              <option value="never">Never (permanent)</option>
              <option value="1d">1 day</option>
              <option value="7d">7 days</option>
              <option value="14d">14 days</option>
              <option value="30d">30 days</option>
              <option value="90d">90 days</option>
              <option value="180d">180 days</option>
              <option value="365d">1 year</option>
              <option value="custom">Custom date…</option>
            </select>
          </div>
          <div id="customDateWrap" style="display:none">
            <label for="newExpiryDate">Custom expiry date</label>
            <input id="newExpiryDate" type="date" />
          </div>
        </div>
        <div class="add-form-row">
          <span class="add-form-error" id="addError"></span>
          <button class="btn-add" onclick="addUser()">Add User</button>
        </div>
      </div>

      <!-- User list -->
      <div class="users-section">
        <h3>Current Users</h3>
        <div id="userTableWrap"></div>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════
     SCRIPT
══════════════════════════════ -->
<script>
// ─── Constants ────────────────────────────────────────────────────────────────
const ADMIN_EMAIL = "jorgen.gud@icloud.com";
const STORAGE_KEY = "refgen_users";

// ─── Helpers ──────────────────────────────────────────────────────────────────
async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function loadUsers() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}
function saveUsers(users) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
}

// ─── Bootstrap admin account ──────────────────────────────────────────────────
async function ensureAdmin() {
  let users = loadUsers();
  if (!users.find(u => u.email === ADMIN_EMAIL)) {
    const hash = await sha256("Admin@refdoc");
    users.unshift({ email: ADMIN_EMAIL, hash, role: 'admin', expiry: null, created: Date.now() });
    saveUsers(users);
  }
}

// ─── Login ────────────────────────────────────────────────────────────────────
let currentUser = null;

async function attemptLogin() {
  const email    = document.getElementById('loginEmail').value.trim().toLowerCase();
  const password = document.getElementById('loginPassword').value;
  const errorEl  = document.getElementById('loginError');
  const btn      = document.getElementById('loginBtn');

  errorEl.textContent = '';
  btn.disabled = true; btn.textContent = 'Signing in…';

  const users     = loadUsers();
  const user      = users.find(u => u.email === email);
  const inputHash = await sha256(password);

  if (!user || user.hash !== inputHash) {
    errorEl.textContent = 'Incorrect email or password.';
    btn.disabled = false; btn.textContent = 'Sign in'; return;
  }

  // Check expiry
  if (user.expiry && Date.now() > user.expiry) {
    errorEl.textContent = 'Your access has expired. Contact the administrator.';
    btn.disabled = false; btn.textContent = 'Sign in'; return;
  }

  currentUser = user;
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('appShell').classList.remove('hidden');
  document.getElementById('adminBtn').style.display = user.role === 'admin' ? '' : 'none';

  btn.disabled = false; btn.textContent = 'Sign in';
}

function signOut() {
  currentUser = null;
  document.getElementById('loginEmail').value   = '';
  document.getElementById('loginPassword').value = '';
  document.getElementById('loginError').textContent = '';
  document.getElementById('appShell').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
}

// ─── Admin modal ──────────────────────────────────────────────────────────────
function openAdmin() {
  renderUserTable();
  document.getElementById('adminModal').classList.remove('hidden');
}
function closeAdmin() {
  document.getElementById('adminModal').classList.add('hidden');
}

// Show/hide custom date field
document.getElementById('newExpiry').addEventListener('change', function() {
  document.getElementById('customDateWrap').style.display = this.value === 'custom' ? '' : 'none';
});

function expiryFromSelection() {
  const sel = document.getElementById('newExpiry').value;
  if (sel === 'never') return null;
  if (sel === 'custom') {
    const d = document.getElementById('newExpiryDate').value;
    if (!d) return undefined; // signal error
    return new Date(d + 'T23:59:59').getTime();
  }
  const days = parseInt(sel);
  return Date.now() + days * 86400000;
}

async function addUser() {
  const email    = document.getElementById('newEmail').value.trim().toLowerCase();
  const password = document.getElementById('newPassword').value;
  const errorEl  = document.getElementById('addError');
  errorEl.textContent = '';

  if (!email || !password) { errorEl.textContent = 'Email and password are required.'; return; }
  if (!/\S+@\S+\.\S+/.test(email)) { errorEl.textContent = 'Enter a valid email address.'; return; }
  if (password.length < 6) { errorEl.textContent = 'Password must be at least 6 characters.'; return; }

  const expiry = expiryFromSelection();
  if (expiry === undefined) { errorEl.textContent = 'Please choose a custom expiry date.'; return; }

  let users = loadUsers();
  if (users.find(u => u.email === email)) { errorEl.textContent = 'A user with this email already exists.'; return; }

  const hash = await sha256(password);
  users.push({ email, hash, role: 'user', expiry, created: Date.now() });
  saveUsers(users);

  // Reset form
  document.getElementById('newEmail').value    = '';
  document.getElementById('newPassword').value = '';
  document.getElementById('newExpiry').value   = 'never';
  document.getElementById('customDateWrap').style.display = 'none';

  renderUserTable();
}

function removeUser(email) {
  if (email === ADMIN_EMAIL) return; // can't remove admin
  let users = loadUsers().filter(u => u.email !== email);
  saveUsers(users);
  renderUserTable();
}

function expiryBadge(expiry) {
  if (!expiry) return `<span class="expiry-badge expiry-never">Never</span>`;
  const now  = Date.now();
  const diff = expiry - now;
  const date = new Date(expiry).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
  if (diff < 0)          return `<span class="expiry-badge expiry-expired">Expired · ${date}</span>`;
  if (diff < 7*86400000) return `<span class="expiry-badge expiry-soon">Expires soon · ${date}</span>`;
  return `<span class="expiry-badge expiry-ok">${date}</span>`;
}

function renderUserTable() {
  const users = loadUsers();
  const wrap  = document.getElementById('userTableWrap');

  if (!users.length) {
    wrap.innerHTML = '<div class="no-users">No users yet.</div>'; return;
  }

  let rows = users.map(u => `
    <tr>
      <td><span class="user-email">${u.email}</span></td>
      <td><span class="user-role ${u.role === 'admin' ? 'role-admin' : 'role-user'}">${u.role}</span></td>
      <td>${expiryBadge(u.expiry)}</td>
      <td>${u.role !== 'admin'
        ? `<button class="btn-remove" onclick="removeUser('${u.email}')">Remove</button>`
        : '—'
      }</td>
    </tr>`).join('');

  wrap.innerHTML = `
    <table class="user-table">
      <thead><tr>
        <th>Email</th><th>Role</th><th>Access expires</th><th></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ─── Barcode preview ──────────────────────────────────────────────────────────
function makeBarcode(value) {
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.classList.add('barcode-svg');
  try {
    JsBarcode(svg, value, {
      format: 'CODE128', width: 2.2, height: 80,
      displayValue: false, margin: 0,
      background: '#ffffff', lineColor: '#000000',
    });
  } catch(e) { svg.style.display = 'none'; }
  return svg;
}

function updatePreview() {
  const ticket  = document.getElementById('ticketRef').value.trim();
  const elev    = document.getElementById('elevcRef').value.trim();
  const desc    = document.getElementById('description').value.trim();
  const content = document.getElementById('previewContent');

  if (!ticket && !elev) {
    content.innerHTML = '<div class="empty-state">Enter references to see preview</div>'; return;
  }

  content.innerHTML = '';
  const container = document.createElement('div');
  container.className = 'barcodes-container';

  function barcodeBlock(label, value) {
    const block = document.createElement('div');
    block.className = 'barcode-block';
    const lbl = document.createElement('div'); lbl.className = 'barcode-label'; lbl.textContent = label;
    const val = document.createElement('div'); val.className = 'barcode-value'; val.textContent = value;
    block.appendChild(lbl); block.appendChild(makeBarcode(value)); block.appendChild(val);
    return block;
  }

  if (ticket) container.appendChild(barcodeBlock('Ticket Reference', ticket));
  if (elev)   container.appendChild(barcodeBlock('Elev-PC Reference', elev));

  content.appendChild(container);

  if (desc) {
    const descEl = document.createElement('div');
    descEl.className = 'doc-description'; descEl.textContent = desc;
    content.appendChild(descEl);
  }
}

// ─── Init ─────────────────────────────────────────────────────────────────────
ensureAdmin();
</script>
